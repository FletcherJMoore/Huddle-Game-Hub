name: Deploy Firebase production

# Deploys the built app, Cloud Functions, and Realtime Database rules whenever
# main is updated. A merged PR to main triggers this workflow automatically.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Don't run two deploys at once; let a newer main finish after the current one.
concurrency:
  group: firebase-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install app dependencies
        run: npm ci

      - name: Install functions dependencies
        # The Firebase CLI loads functions/index.js locally to discover functions,
        # so its dependencies must be installed before deploy.
        run: npm ci
        working-directory: functions

      - name: Write build-time env
        # The VITE_FIREBASE_* values are baked into the client bundle at build time.
        # (Firebase web config is public, but we keep it in GitHub secrets to match
        # the repo's .gitignore.)
        run: |
          cat > .env <<'EOF'
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL=${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY=${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          EOF

      - name: Build
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HUDDLE_B73F3 }}

      - name: Deploy to Firebase
        run: npx --yes firebase-tools@latest deploy --only hosting,functions,database,storage --project huddle-b73f3 --non-interactive
